name: Deploy React App

on:
  push:
    branches:
      - main
      - master

jobs:
  # DEV deployment job
  deploy-dev:
    if: contains(github.event.head_commit.message, '[dev]')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kodą
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .vite
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('vite.config.js') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Instaliuoti priklausomybes
        run: npm ci

      - name: Išvalyti Vite cache
        run: rm -rf node_modules/.vite

      - name: Buildinti projektą
        run: npm run build

      - name: Cache dist katalogą
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-dev-${{ github.sha }}

      - name: Deploy į DEV serverį
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEV_SERVER_HOST }}
          REMOTE_USER: ${{ secrets.DEV_SERVER_USER }}
          SOURCE: "dist/"
          TARGET: ${{ secrets.DEV_DEPLOY_PATH }}
          EXCLUDE: "/node_modules/, /.git/"

      - name: Perkrauti nginx (DEV)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t
            sudo systemctl reload nginx

  # PROD deployment job
  deploy-prod:
    if: contains(github.event.head_commit.message, '[prod]')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kodą
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .vite
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('vite.config.js') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Instaliuoti priklausomybes
        run: npm ci

      - name: Išvalyti Vite cache
        run: rm -rf node_modules/.vite

      - name: Buildinti projektą
        run: npm run build

      - name: Cache dist katalogą
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-prod-${{ github.sha }}

      - name: Deploy į PROD serverį
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.PROD_SERVER_HOST }}
          REMOTE_USER: ${{ secrets.PROD_SERVER_USER }}
          SOURCE: "dist/"
          TARGET: ${{ secrets.PROD_DEPLOY_PATH }}
          EXCLUDE: "/node_modules/, /.git/"

      - name: Perkrauti nginx (PROD)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            sudo nginx -t
            sudo systemctl reload nginx