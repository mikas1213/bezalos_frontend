<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Be žalos · Marketing site · Print</title>
  <link rel="icon" href="../../assets/logo/icon_32x32.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Print-ready overrides ─────────────────────────────────── */
    @page { size: A4 portrait; margin: 12mm; }

    /* Float the nav statically at the top of the document flow */
    .bz-nav {
      position: static !important;
      transform: none !important;
      padding: 16px 24px !important;
    }
    .bz-nav .bz-nav-pill { box-shadow: 0 1px 3px rgba(8,43,29,.12) !important; }

    /* Suppress transient/interactive chrome */
    .bz-banner-backdrop, .bz-toast { display: none !important; }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        animation: none !important;
        transition: none !important;
      }
      html, body { background: #fff !important; }

      .bz-nav { padding: 0 0 8px !important; }
      .bz-nav .bz-nav-pill {
        max-width: 100% !important;
        border-radius: 14px !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background: #fff !important;
      }

      /* Avoid splitting meaningful blocks across pages */
      section, .bz-card, .bz-article-card, figure, .bz-step,
      .bz-benefit, .bz-testimonial, .bz-cta {
        break-inside: avoid;
      }
      img { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="Navbar.jsx"></script>
  <script type="text/babel" src="HomePage.jsx"></script>
  <script type="text/babel" src="VirtuvePage.jsx"></script>
  <script type="text/babel" src="StraipsniaiPage.jsx"></script>
  <script type="text/babel" src="ArticlePage.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="Banner.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <!-- Auto-print once React has mounted and fonts are ready -->
  <script type="text/babel">
    (async () => {
      // Wait for the root to actually render content
      const root = document.getElementById('root');
      const start = Date.now();
      while (!root.firstChild && Date.now() - start < 5000) {
        await new Promise(r => setTimeout(r, 100));
      }
      try { await document.fonts.ready; } catch (e) {}
      await new Promise(r => setTimeout(r, 600));
      window.print();
    })();
  </script>
</body>
</html>
