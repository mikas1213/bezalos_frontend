<!doctype html>
<!-- @dsCard group="Brand" name="Logo" subtitle="be žalos wordmark — light + dark surface, app icon, favicon" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Logo</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div style="background: white; padding: 28px 24px; border-radius: 12px; border: 1px solid var(--neutral-200); display: grid; place-items: center;">
      <img src="../assets/logo/be-zalos-logo.svg" style="height: 56px; color: #082b1d;">
    </div>
    <div style="background: linear-gradient(180deg, #084747, #082b1d); padding: 28px 24px; border-radius: 12px; display: grid; place-items: center;">
      <img src="../assets/logo/be-zalos-logo.svg" style="height: 56px; filter: brightness(0) invert(1) sepia(1) hue-rotate(60deg) brightness(1) saturate(2);">
    </div>
  </div>
  <div style="display: flex; gap: 20px; align-items: center; padding-top: 4px;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="../assets/logo/icon_180x180.png" style="width: 36px; height: 36px; border-radius: 8px;">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3)">App icon · 180×180</div>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <img src="../assets/logo/icon_32x32.png" style="width: 32px; height: 32px; border-radius: 6px;">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3)">Favicon · 32×32</div>
    </div>
    <div style="margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); max-width: 220px; text-align: right;">
      SVG recolours via CSS <code>color</code>. Use white on dark, ink on light.
    </div>
  </div>
</div>
</body></html>
