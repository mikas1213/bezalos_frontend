<!doctype html>
<!-- @dsCard group="Brand" name="Video cards" subtitle="Virtuvė library — 5:7 photo + bottom-gradient + copy" viewport="700x360" -->
<html lang="lt"><head><meta charset="utf-8"><title>Cards — Video</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3);">Virtuvė video card — 5:7 ratio, photo + bottom gradient + copy</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;">
    <div style="position: relative; aspect-ratio: 5/7; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #1f3a2c;">
      <img src="../assets/images/meal-salad.webp" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;">
      <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%);"></div>
      <div style="position: absolute; top: 12px; left: 12px; background: hsl(100,60%,50%); color: white; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 6px; font-family: Poppins;">Nauja</div>
      <div style="position: absolute; inset: 12px; top: auto; color: white; font-family: Poppins;">
        <div style="display: inline-block; border: 1px solid white; border-radius: 6px; padding: 2px 8px; font-size: 9.5px; text-transform: uppercase; margin-bottom: 8px;">Sveika mityba</div>
        <div style="font-size: 16px; font-weight: 700; line-height: 1.3;">Salotos su kepta gile</div>
      </div>
    </div>
    <div style="position: relative; aspect-ratio: 5/7; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #1f3a2c;">
      <img src="../assets/images/meal-pancakes.webp" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;">
      <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%);"></div>
      <div style="position: absolute; inset: 12px; top: auto; color: white; font-family: Poppins;">
        <div style="display: inline-block; border: 1px solid white; border-radius: 6px; padding: 2px 8px; font-size: 9.5px; text-transform: uppercase; margin-bottom: 8px;">Pusryčiai</div>
        <div style="font-size: 16px; font-weight: 700; line-height: 1.3;">Sūrio blynai</div>
      </div>
    </div>
    <div style="position: relative; aspect-ratio: 5/7; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #1f3a2c;">
      <img src="../assets/images/meal-vegetables.webp" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;">
      <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%);"></div>
      <div style="position: absolute; inset: 12px; top: auto; color: white; font-family: Poppins;">
        <div style="display: inline-block; border: 1px solid white; border-radius: 6px; padding: 2px 8px; font-size: 9.5px; text-transform: uppercase; margin-bottom: 8px;">Vakarienė</div>
        <div style="font-size: 16px; font-weight: 700; line-height: 1.3;">Daržovių dubuo</div>
      </div>
    </div>
  </div>
</div>
</body></html>
