<!doctype html>
<!-- @dsCard group="Brand" name="Neutrals" subtitle="hsl(145…) — page bg, body ink, hairlines" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3);">--neutral-* (hsl 145, slight green-grey cast — page bg, ink, hairlines)</div>
  <div class="row" style="gap: 6px;">
    <div class="swatch light" style="background:hsl(145,12%,97%); width: 60px; height: 70px;"><div class="name">050</div></div>
    <div class="swatch light" style="background:hsl(145,10%,94%); width: 60px; height: 70px;"><div class="name">100</div></div>
    <div class="swatch light" style="background:hsl(145,10%,88%); width: 60px; height: 70px;"><div class="name">200</div></div>
    <div class="swatch light" style="background:hsl(145,8%,78%); width: 60px; height: 70px;"><div class="name">300</div></div>
    <div class="swatch light" style="background:hsl(145,8%,65%); width: 60px; height: 70px;"><div class="name">400</div></div>
    <div class="swatch dark" style="background:hsl(145,6%,52%); width: 60px; height: 70px;"><div class="name">500</div></div>
    <div class="swatch dark" style="background:hsl(145,8%,40%); width: 60px; height: 70px;"><div class="name">600</div></div>
    <div class="swatch dark" style="background:hsl(145,10%,28%); width: 60px; height: 70px;"><div class="name">700</div></div>
    <div class="swatch dark" style="background:hsl(145,12%,18%); width: 60px; height: 70px;"><div class="name">800</div></div>
    <div class="swatch dark" style="background:hsl(145,15%,10%); width: 60px; height: 70px;"><div class="name">900</div></div>
  </div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11.5px; color: var(--fg-2); padding-top: 4px;">
    <div><b style="font-family: var(--font-mono); color: var(--fg-1)">050</b> Page background</div>
    <div><b style="font-family: var(--font-mono); color: var(--fg-1)">100</b> Card surface</div>
    <div><b style="font-family: var(--font-mono); color: var(--fg-1)">200</b> Hairlines</div>
    <div><b style="font-family: var(--font-mono); color: var(--fg-1)">400</b> Helper text, icons</div>
    <div><b style="font-family: var(--font-mono); color: var(--fg-1)">500</b> Metadata</div>
    <div><b style="font-family: var(--font-mono); color: var(--fg-1)">700</b> Body text</div>
  </div>
</div>
</body></html>
