<!doctype html>
<!-- @dsCard group="Brand" name="Photography" subtitle="Hero meal photos (5-photo rotation) · Sandra portraits · hand-signed signature" viewport="700x360" -->
<html lang="lt"><head><meta charset="utf-8"><title>Photography Vibe</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3);">
    Warm natural light · real food · soft greens · no studio · 5-photo hero rotation
  </div>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;">
    <img src="../assets/images/meal-salad.webp" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;">
    <img src="../assets/images/meal-burgeriukas.webp" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;">
    <img src="../assets/images/meal-pancakes.webp" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;">
    <img src="../assets/images/meal-sandwich.webp" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;">
    <img src="../assets/images/meal-vegetables.webp" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;">
  </div>
  <div style="display: grid; grid-template-columns: 1.4fr 1fr; gap: 10px; padding-top: 4px;">
    <img src="../assets/images/author2.webp" style="width: 100%; height: 130px; object-fit: cover; border-radius: 8px;">
    <div style="display: flex; flex-direction: column; gap: 4px; justify-content: center; font-family: Poppins;">
      <div style="font-size: 16px; color: var(--fg-1); font-weight: 500;">Labas, esu Sandra</div>
      <img src="../assets/images/signature.webp" style="width: 140px;">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding-top: 6px;">Sandra (the author) is the brand. Always present, never airbrushed.</div>
    </div>
  </div>
</div>
</body></html>
