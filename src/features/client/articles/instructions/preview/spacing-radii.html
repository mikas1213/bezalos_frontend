<!doctype html>
<!-- @dsCard group="Brand" name="Radii" subtitle="From 6px pill insets up to the 14.5vw hero scoop" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 72px; height: 72px; background: #084747; border-radius: 6px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center;"><b style="color:var(--fg-1)">sm · 6</b><br>Pills inside cards</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 72px; height: 72px; background: #084747; border-radius: 8px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center;"><b style="color:var(--fg-1)">md · 8</b><br>App buttons, inputs</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 72px; height: 72px; background: #084747; border-radius: 12px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center;"><b style="color:var(--fg-1)">lg · 12</b><br>Video cards</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 72px; height: 72px; background: #084747; border-radius: 24px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center;"><b style="color:var(--fg-1)">xl · 24</b><br>Feature cards</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 72px; height: 72px; background: #084747; border-radius: 28px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center;"><b style="color:var(--fg-1)">2xl · 28</b><br>Banner / modal</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <div style="width: 110px; height: 38px; background: #7ed957; border-radius: 999px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center;"><b style="color:var(--fg-1)">pill · 999</b><br>CTAs, nav login</div>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 14px; padding-top: 4px;">
    <div style="width: 140px; height: 50px; background: linear-gradient(180deg, #084747, #082b1d); border-radius: 0 0 36px 36px;"></div>
    <div style="font-size: 11.5px; color: var(--fg-3); font-family: var(--font-mono);">
      <b style="color:var(--fg-1)">--radius-hero-cut · 14.5vw</b><br>
      Bottom-only "scoop" on the hero & dark sections — brand signature
    </div>
  </div>
</div>
</body></html>
