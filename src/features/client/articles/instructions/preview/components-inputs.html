<!doctype html>
<!-- @dsCard group="Brand" name="Inputs" subtitle="Newsletter pill + app form fields (idle/focus/error)" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 10px;">Newsletter — pill input with inline CTA</div>
    <div style="position: relative; max-width: 460px;">
      <input style="border: none; outline: 1.5px solid #cdd1cb; border-radius: 4rem; height: 56px; width: 100%; font-size: 16px; padding-right: 168px; padding-left: 24px; color: #082b1d; background: hsl(120,7%,94%); box-shadow: rgba(99,99,99,.2) 0 2px 8px 0; font-family: Poppins;" placeholder="Tavo el. paštas">
      <button style="position: absolute; top: 50%; transform: translateY(-50%); right: 6px; border: none; border-radius: 10rem; color: #082b1d; font-size: 14px; font-weight: 600; background: #7ed957; height: 44px; width: 156px; box-shadow: rgba(99,99,99,.2) 0 2px 8px 0; font-family: Poppins;">Užsisakyti naujienas</button>
    </div>
  </div>
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 10px;">App field — idle / focus / error</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
      <div>
        <label style="font-size: 12px; color: #878b86; font-family: Poppins;">Vardas</label>
        <input style="display: block; margin-top: 4px; width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #cdd1cb; font-family: Poppins; font-size: 14px;" placeholder="Sandra">
      </div>
      <div>
        <label style="font-size: 12px; color: #878b86; font-family: Poppins;">El. paštas</label>
        <input style="display: block; margin-top: 4px; width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #084747; outline: 0; font-family: Poppins; font-size: 14px;" value="sandra@bezalos.lt">
      </div>
      <div>
        <label style="font-size: 12px; color: #c00; font-family: Poppins;">Slaptažodis</label>
        <input style="display: block; margin-top: 4px; width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid hsl(0,85%,52%); font-family: Poppins; font-size: 14px;" value="•••">
      </div>
    </div>
  </div>
</div>
</body></html>
