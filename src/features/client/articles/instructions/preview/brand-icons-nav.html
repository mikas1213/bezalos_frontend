<!doctype html>
<!-- @dsCard group="Brand" name="Nav & social icons" subtitle="Custom mobile-nav SVGs + Phosphor footer social icons" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Icons — Navbar & Social</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 8px;">Mobile bottom-nav · custom SVG · active = lime</div>
    <div style="display: flex; gap: 28px; align-items: center; color: var(--dark-green-600);">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: Poppins; font-size: 11px;">
        <img src="../assets/icons/navbar/virtuve.svg" style="width: 28px; height: 28px;">
        <span>Virtuvė</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: Poppins; font-size: 11px;">
        <img src="../assets/icons/navbar/receptai.svg" style="width: 28px; height: 28px;">
        <span>Receptai</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: Poppins; font-size: 11px;">
        <img src="../assets/icons/navbar/paslaugos.svg" style="width: 28px; height: 28px;">
        <span>Paslaugos</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: Poppins; font-size: 11px; padding: 6px 12px; border-radius: 999px; background: hsl(120,7%,94%); color: #60c040;">
        <img src="../assets/icons/navbar/profilis.svg" style="width: 28px; height: 28px; filter: invert(58%) sepia(89%) saturate(420%) hue-rotate(60deg);">
        <span>Profilis</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: Poppins; font-size: 11px;">
        <img src="../assets/icons/navbar/prisijungti.svg" style="width: 28px; height: 28px;">
        <span>Prisijungti</span>
      </div>
    </div>
  </div>
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 8px;">Social (footer) — Phosphor regular</div>
    <div style="display: flex; gap: 18px; align-items: center; color: var(--dark-green-600);">
      <img src="../assets/icons/social/facebook.svg" style="width: 26px; height: 26px;">
      <img src="../assets/icons/social/instagram.svg" style="width: 26px; height: 26px;">
      <img src="../assets/icons/social/envelope.svg" style="width: 26px; height: 26px;">
      <div style="margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); max-width: 280px; text-align: right;">
        Code uses <code>react-icons/pi</code> (Phosphor) directly — match the regular stroke.
      </div>
    </div>
  </div>
</div>
</body></html>
