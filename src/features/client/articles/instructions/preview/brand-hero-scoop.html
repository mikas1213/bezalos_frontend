<!doctype html>
<!-- @dsCard group="Brand" name="Hero scoop" subtitle="Dark gradient hero with bottom-only rounded corners — the signature gesture" viewport="700x360" -->
<html lang="lt"><head><meta charset="utf-8"><title>Hero Scoop Motif</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3);">
    The signature gesture: dark vertical gradient with <b>bottom-only</b> rounded corners.
  </div>
  <div style="position: relative; height: 220px; border-radius: 8px 8px 80px 80px; background: linear-gradient(180deg, #084747, #082b1d); padding: 28px; color: #eff1ef; font-family: Poppins; overflow: hidden;">
    <div style="font-size: 30px; font-weight: 700; line-height: 1.15;">Tavo <span style="color: hsl(100,60%,60%);">ilgalaikių</span><br>mitybos pokyčių<br>garantas</div>
    <div style="margin-top: 16px; max-width: 360px; font-size: 12px; opacity: 0.85; line-height: 1.5;">Čia išmoksi sveikatai palankios mitybos pagrindų, tapsi bendruomenės nare.</div>
    <button style="margin-top: 14px; background: transparent; color: hsl(100,60%,60%); border: 1px solid hsl(100,60%,60%); padding: 7px 22px; border-radius: 999px; font-size: 13px; font-weight: 600; font-family: Poppins; box-shadow: 0 5px 20px 5px rgba(0,0,0,.3);">Virtuvė</button>
  </div>
  <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3);">
    Desktop: <code>border-radius: 0 0 14.5vw 14.5vw</code> · Mobile: <code>11.5vw</code>
  </div>
</div>
</body></html>
