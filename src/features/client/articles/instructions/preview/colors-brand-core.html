<!doctype html>
<!-- @dsCard group="Brand" name="Brand core colors" subtitle="Greens, lime, cream + the hero gradient" viewport="700x220" -->
<html lang="lt"><head><meta charset="utf-8"><title>Brand Core Colors</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch dark" style="background:#084747">
      <div class="name">Green Top</div>
      <div class="hex">#084747</div>
    </div>
    <div class="swatch dark" style="background:#082b1d">
      <div class="name">Green Bottom</div>
      <div class="hex">#082b1d</div>
    </div>
    <div class="swatch dark" style="background:#7ed957">
      <div class="name">Lime</div>
      <div class="hex">#7ed957</div>
    </div>
    <div class="swatch dark" style="background:#60c040">
      <div class="name">Lime Pressed</div>
      <div class="hex">#60c040</div>
    </div>
    <div class="swatch light" style="background:#eff1ef">
      <div class="name">Cream</div>
      <div class="hex">#eff1ef</div>
    </div>
    <div class="swatch light" style="background:#fff; box-shadow: inset 0 0 0 1px var(--neutral-200)">
      <div class="name">White</div>
      <div class="hex">#ffffff</div>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 14px; padding-top: 4px;">
    <div style="width: 96px; height: 22px; border-radius: 6px; background: linear-gradient(180deg, #084747, #082b1d);"></div>
    <div style="font-size: 11.5px; color: var(--fg-3); font-family: var(--font-mono);">
      Hero gradient — top→bottom on every dark surface
    </div>
  </div>
</div>
</body></html>
