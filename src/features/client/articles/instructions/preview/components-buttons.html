<!doctype html>
<!-- @dsCard group="Brand" name="Buttons" subtitle="Lime CTA, outline pill on dark, text link with underline indicator" viewport="700x320" -->
<html lang="lt"><head><meta charset="utf-8"><title>Buttons — CTAs</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 10px;">Lime primary — banners, app CTAs</div>
    <div style="display: flex; gap: 14px; align-items: center;">
      <button style="background: #7ed957; color: #082b1d; border: none; padding: 14px 28px; border-radius: 999px; font-size: 13px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; font-family: Poppins; box-shadow: 0 10px 24px -10px #7ed957;">Žiūrėti dabar</button>
      <button style="background: #7ed957; color: #082b1d; border: none; padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; font-family: Poppins;">Užsisakyti</button>
      <button style="background: #60c040; color: #082b1d; border: none; padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; font-family: Poppins;" aria-pressed="true">Pressed</button>
      <button style="background: #cdd1cb; color: #eff1ef; border: none; padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; font-family: Poppins; cursor: not-allowed;" disabled>Disabled</button>
    </div>
  </div>
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 10px;">Outline pill — hero on dark, in-app secondary</div>
    <div style="display: flex; gap: 14px; align-items: center; padding: 16px; background: linear-gradient(180deg, #084747, #082b1d); border-radius: 12px;">
      <button style="background: transparent; color: #7ed957; border: 1px solid #7ed957; padding: 10px 26px; border-radius: 999px; font-size: 16px; font-weight: 600; font-family: Poppins;">Virtuvė</button>
      <button style="background: rgba(126,217,87,0.2); color: #7ed957; border: 1px solid #7ed957; padding: 10px 26px; border-radius: 999px; font-size: 16px; font-weight: 600; font-family: Poppins;">Hover</button>
    </div>
  </div>
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 10px;">Text link (nav, footer)</div>
    <div style="display: flex; gap: 28px; align-items: center; font-family: Poppins; font-size: 16px; color: #082b1d;">
      <span>Receptai</span>
      <span style="position: relative;">Virtuvė<span style="position: absolute; bottom: -6px; left: 0; right: 0; height: 1.2px; background: #082b1d; border-radius: 999px;"></span></span>
      <span style="color: #878b86;">Paslaugos</span>
    </div>
  </div>
</div>
</body></html>
