<!doctype html>
<!-- @dsCard group="Brand" name="Nav bar" subtitle="At-top (teal) vs scrolled (white) — same nav, different theme" viewport="700x220" -->
<html lang="lt"><head><meta charset="utf-8"><title>Nav</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 8px;">At-top on home — teal slab, cream text</div>
    <div style="background: #084747; color: #eff1ef; display: flex; align-items: center; gap: 24px; padding: 18px 24px; border-radius: 8px;">
      <svg viewBox="0 0 100 32" height="22" style="flex: 0 0 auto"><text x="0" y="22" font-family="Poppins" font-weight="800" font-size="22" fill="#eff1ef" letter-spacing="-0.5">be žalos</text><line x1="0" y1="27" x2="100" y2="27" stroke="#eff1ef" stroke-width="1.4"/></svg>
      <div style="display: flex; gap: 22px; font-size: 14px; font-family: Poppins; font-weight: 300; opacity: 0.95;">
        <span>Atlik testą</span><span>Virtuvė</span><span style="position: relative;">Receptai<span style="position: absolute; bottom: -8px; left: 0; right: 0; height: 1.2px; background: #eff1ef; border-radius: 999px;"></span></span><span>Paslaugos</span><span>Narystė</span>
      </div>
      <div style="margin-left: auto; color: #7ed957; font-size: 14px; font-family: Poppins; font-weight: 600;">Prisijungti</div>
    </div>
  </div>
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 8px;">Scrolled / default — white surface, ink text</div>
    <div style="background: white; color: #082b1d; display: flex; align-items: center; gap: 24px; padding: 18px 24px; border-radius: 8px; border-bottom: 0.5px solid hsl(120,7%,90%); box-shadow: rgba(0,0,0,.05) 0 0.5px 10px 0;">
      <svg viewBox="0 0 100 32" height="22" style="flex: 0 0 auto"><text x="0" y="22" font-family="Poppins" font-weight="800" font-size="22" fill="#082b1d" letter-spacing="-0.5">be žalos</text><line x1="0" y1="27" x2="100" y2="27" stroke="#082b1d" stroke-width="1.4"/></svg>
      <div style="display: flex; gap: 22px; font-size: 14px; font-family: Poppins; font-weight: 300;">
        <span>Atlik testą</span><span>Virtuvė</span><span>Receptai</span><span>Paslaugos</span><span>Narystė</span>
      </div>
      <div style="margin-left: auto; color: hsl(100,60%,50%); font-size: 14px; font-family: Poppins; font-weight: 600;">Prisijungti</div>
    </div>
  </div>
</div>
</body></html>
