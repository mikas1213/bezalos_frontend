<!doctype html>
<!-- @dsCard group="Brand" name="Elevation" subtitle="Four shadows — inputs, cards, CTA-on-dark, modal" viewport="700x320" -->
<html lang="lt"><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
    <div>
      <div style="height: 70px; background: white; border-radius: 12px; box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding-top: 8px;"><b style="color: var(--fg-1)">shadow-xs</b><br>0 2px 8px rgba(99,99,99,.2)<br>Inputs, pills</div>
    </div>
    <div>
      <div style="height: 70px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding-top: 8px;"><b style="color: var(--fg-1)">shadow-card</b><br>0 4px 15px rgba(0,0,0,.1)<br>Video & content cards</div>
    </div>
    <div>
      <div style="height: 70px; background: #7ed957; border-radius: 999px; box-shadow: 0 5px 20px 5px rgba(0, 0, 0, 0.3);"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding-top: 8px;"><b style="color: var(--fg-1)">shadow-cta</b><br>0 5px 20px 5px rgba(0,0,0,.3)<br>Hero CTA on dark bg</div>
    </div>
    <div>
      <div style="height: 70px; background: white; border-radius: 28px; box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.04);"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding-top: 8px;"><b style="color: var(--fg-1)">shadow-modal</b><br>0 30px 80px -20px rgba(0,0,0,.55)<br>Offer banner</div>
    </div>
  </div>
</div>
</body></html>
