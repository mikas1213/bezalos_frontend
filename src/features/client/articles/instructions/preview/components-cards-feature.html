<!doctype html>
<!-- @dsCard group="Brand" name="Feature cards" subtitle="Interactive plan trio — lime fill = active, outline = idle, grey = disabled" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Cards — Feature</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3);">Interactive plan — Inter type, 24px radius, 2px outline (or lime fill = active)</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;">
    <div style="border-radius: 24px; background: #7ed957; padding: 22px 20px; min-height: 200px; display: flex; flex-direction: column; gap: 14px;">
      <div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(8,43,29,0.12); display: grid; place-items: center; color: #082b1d; font-size: 18px;">⇄</div>
      <div style="font-family: Inter; font-weight: 700; font-size: 22px; line-height: 1.05; color: #082b1d;">Produktų<br>keitimas plane</div>
      <div style="font-family: Inter; font-size: 12.5px; line-height: 1.3; color: #082b1d; margin-top: auto;">Jei jau bandei keistis savarankiškai…</div>
    </div>
    <div style="border-radius: 24px; border: 2px solid #082b1d; padding: 22px 20px; min-height: 200px; display: flex; flex-direction: column; gap: 14px;">
      <div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(8,71,71,0.08); display: grid; place-items: center; color: #084747; font-size: 18px;">📋</div>
      <div style="font-family: Inter; font-weight: 700; font-size: 22px; line-height: 1.05; color: #084747;">Receptų<br>sudarymas</div>
      <div style="font-family: Inter; font-size: 12.5px; line-height: 1.3; color: #084747; margin-top: auto;">Asmeninis receptų konstruktorius su skaičiavimu.</div>
    </div>
    <div style="border-radius: 24px; border: 2px solid #cdd1cb; padding: 22px 20px; min-height: 200px; display: flex; flex-direction: column; gap: 14px; color: #878b86;">
      <div style="width: 32px; height: 32px; border-radius: 8px; background: hsl(120,7%,94%); display: grid; place-items: center; font-size: 18px;">📈</div>
      <div style="font-family: Inter; font-weight: 700; font-size: 22px; line-height: 1.05;">Mitybos<br>sekimas</div>
      <div style="font-family: Inter; font-size: 12.5px; line-height: 1.3; margin-top: auto;">Disabled state — feature in development.</div>
    </div>
  </div>
</div>
</body></html>
