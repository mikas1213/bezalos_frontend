<!doctype html>

<body>
<div class="card">
  <div class="row" style="gap: 6px;">
    <div class="swatch light" style="background:hsl(100,60%,94%); width: 64px; height: 80px;"><div class="name">050</div></div>
    <div class="swatch light" style="background:hsl(105,51%,90%); width: 64px; height: 80px;"><div class="name">100</div></div>

    <div class="swatch dark" style="background:hsl(100,60%,40%); width: 64px; height: 80px;"><div class="name">700</div></div>

    <div class="swatch dark" style="background:hsl(100,60%,20%); width: 64px; height: 80px;"><div class="name">900</div></div>
  </div>
  <div style="font-size: 11.5px; color: var(--fg-3); font-family: var(--font-mono);">
    --light-green-600 ★ is the canonical CTA fill · --light-green-500 is hover/pressed darker
  </div>
</div>
</body></html>
