<!doctype html>
<!-- @dsCard group="Brand" name="Macro & semantic" subtitle="Calorie-diary chart colors + validation status" viewport="700x280" -->
<html lang="lt"><head><meta charset="utf-8"><title>Macro & Semantic</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 6px;">Macro-nutrient palette — chart fills in the Calorie Diary</div>
    <div class="row" style="gap: 8px;">
      <div style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
        <div style="width: 80px; height: 56px; border-radius: 10px; background: #245d6b22; border: 1px solid #245d6b; display: flex; align-items: center; justify-content: center; color: #245d6b; font-weight: 700; font-size: 13px;">B</div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-3)">Baltymai · #245d6b</div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
        <div style="width: 80px; height: 56px; border-radius: 10px; background: #30c04022; border: 1px solid #30c040; display: flex; align-items: center; justify-content: center; color: #30c040; font-weight: 700; font-size: 13px;">A</div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-3)">Angliav. · #30c040</div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
        <div style="width: 80px; height: 56px; border-radius: 10px; background: #ec9f1122; border: 1px solid #ec9f11; display: flex; align-items: center; justify-content: center; color: #ec9f11; font-weight: 700; font-size: 13px;">R</div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-3)">Riebalai · #ec9f11</div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
        <div style="width: 80px; height: 56px; border-radius: 10px; background: #a7aba622; border: 1px solid #878b86; display: flex; align-items: center; justify-content: center; color: #878b86; font-weight: 700; font-size: 13px;">kcal</div>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-3)">Kalorijos · #878b86</div>
      </div>
    </div>
  </div>
  <div>
    <div style="font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 6px;">Semantic — validation & status</div>
    <div class="row" style="gap: 8px;">
      <div class="swatch dark" style="background: hsl(0,85%,52%); width: 80px; height: 50px;"><div class="name">Error</div><div class="hex">#ec3a3a</div></div>
      <div class="swatch dark" style="background: #60c040; width: 80px; height: 50px;"><div class="name">Success</div><div class="hex">#60c040</div></div>
      <div class="swatch dark" style="background: #f3c127; width: 80px; height: 50px;"><div class="name">Star</div><div class="hex">#f3c127</div></div>
      <div class="swatch dark" style="background: #dc143c; width: 80px; height: 50px;"><div class="name">Admin red</div><div class="hex">#dc143c</div></div>
      <div class="swatch dark" style="background: #ffa500; width: 80px; height: 50px;"><div class="name">Admin amber</div><div class="hex">#ffa500</div></div>
    </div>
  </div>
</div>
</body></html>
